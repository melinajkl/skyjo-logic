services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: skyjo
      MARIADB_USER: app
      MARIADB_PASSWORD: app_pw
      MARIADB_ROOT_PASSWORD: root_pw

    ports:
      - "3306:3306" # wird benötigt um in der IDE auf die Datenbank zugreifen zu können
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uapp -papp_pw --silent"]
      interval: 5s
      timeout: 3s
      retries: 25

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: skyjo
      DB_USER: app
      DB_PASS: app_pw
      # Add this to ensure the Quarkus runtime also knows where the DB is
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mariadb://db:3306/skyjo
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
